[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Start with a focused set of rules — catches real bugs without overwhelming noise
select = [
    "E",   # Python style errors
    "F",   # Pyflakes — unused imports, undefined names, etc.
    "W",   # Warnings
    "I",   # Import sorting
    "UP",  # Suggest modern Python syntax
]
ignore = [
    "E501",  # Line too long — not worth fixing everywhere right now
]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportMissingImports = true
reportUndefinedVariable = true
reportUnusedImport = true
reportUnusedVariable = true
